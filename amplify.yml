# AWS Amplify Hosting build spec
# https://docs.aws.amazon.com/amplify/latest/userguide/build-settings.html
#
# This file is auto-detected by Amplify Console when you connect the repository.
# It builds the SvelteKit client (a static SPA) from a pnpm monorepo and uploads
# the contents of `client/build/` to Amplify's CDN. Environment variables that
# start with `VITE_` are injected at build time and embedded into the bundle.
version: 1
applications:
  - appRoot: client
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@latest --activate
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter client build
      artifacts:
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ../node_modules/**/*
          - ../server/node_modules/**/*
          - ../packages/**/node_modules/**/*
