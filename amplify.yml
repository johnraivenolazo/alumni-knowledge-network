# AWS Amplify Standard Build Spec (pnpm Monorepo compatible)
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@10.33.0 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        # Build only the client
        - pnpm --filter client build
  artifacts:
    # Point directly to the build output
    baseDirectory: client/build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - client/node_modules/**/*
      - server/node_modules/**/*
      - packages/**/node_modules/**/*
