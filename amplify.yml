version: 1
applications:
  - appRoot: client
    frontend:
      phases:
        preBuild:
          commands:
            - cd ..
            - corepack enable
            - corepack prepare pnpm@latest --activate
            - pnpm install --frozen-lockfile
        build:
          commands:
            - cd ..
            - pnpm --filter client build
      artifacts:
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ../node_modules/**/*
          - ../server/node_modules/**/*
          - ../packages/**/node_modules/**/*
